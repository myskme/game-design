<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYSKME 游戏设计</title>
<style>
:root {
  color-scheme: dark;
  --ink: #f8f3e8;
  --muted: rgba(248, 243, 232, 0.72);
  --line: rgba(255, 255, 255, 0.18);
  --gold: #f1c45b;
  --teal: #5ad7d0;
  --rose: #ef6f8a;
  --panel: rgba(18, 22, 28, 0.76);
  --shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  color: var(--ink);
  background:
    linear-gradient(120deg, rgba(9, 12, 18, 0.78), rgba(18, 34, 37, 0.58) 44%, rgba(47, 20, 31, 0.66)),
    url("assets/castle-harbor-hero.png") center / cover fixed no-repeat;
}

a {
  color: inherit;
  text-decoration: none;
}

.page {
  width: min(1180px, calc(100% - 36px));
  min-height: 100vh;
  margin: 0 auto;
  padding: 34px 0 30px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 28px;
}

.topbar,
.foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.mark {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(241, 196, 91, 0.58);
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(241, 196, 91, 0.23), rgba(90, 215, 208, 0.14));
  box-shadow: 0 12px 30px rgba(241, 196, 91, 0.15);
  font-weight: 900;
}

.brand-name {
  font-size: 16px;
  font-weight: 800;
}

.brand-sub {
  color: var(--muted);
  font-size: 12px;
  margin-top: 3px;
}

.repo-link {
  min-height: 40px;
  padding: 0 15px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.22);
  color: var(--muted);
  font-size: 13px;
}

.repo-link:hover {
  color: var(--ink);
  border-color: rgba(241, 196, 91, 0.5);
}

.hero {
  display: grid;
  align-content: center;
  gap: 30px;
  padding: 28px 0;
}

.headline {
  max-width: 980px;
}

.kicker {
  color: var(--gold);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

h1 {
  margin: 12px 0 14px;
  font-size: clamp(40px, 6.4vw, 76px);
  line-height: 0.94;
  letter-spacing: 0;
}

.lede {
  max-width: 620px;
  color: var(--muted);
  font-size: clamp(16px, 2vw, 19px);
  line-height: 1.7;
}

.launch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
  gap: 16px;
}

.launch-card {
  position: relative;
  min-height: 235px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.launch-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--art) center / cover no-repeat;
  opacity: 0.38;
  transform: scale(1.02);
  transition: opacity 180ms ease, transform 180ms ease;
}

.launch-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(6, 8, 12, 0.08), rgba(6, 8, 12, 0.78));
}

.launch-card:hover::before {
  opacity: 0.52;
  transform: scale(1.06);
}

.launch-content {
  position: relative;
  z-index: 1;
  height: 100%;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 20px;
}

.tag {
  width: max-content;
  max-width: 100%;
  padding: 7px 10px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.28);
  color: rgba(255, 255, 255, 0.82);
  font-size: 12px;
  font-weight: 700;
}

.card-title {
  margin: 0;
  font-size: clamp(22px, 2.8vw, 31px);
  line-height: 1.1;
  letter-spacing: 0;
}

.card-meta {
  margin-top: 10px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.55;
}

.go {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.24);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.12);
  font-size: 22px;
  align-self: flex-end;
}

.foot {
  color: rgba(248, 243, 232, 0.64);
  font-size: 12px;
}

@media (max-width: 820px) {
  .page {
    width: min(100% - 26px, 620px);
    padding-top: 22px;
  }

  .topbar,
  .foot {
    align-items: flex-start;
    flex-direction: column;
  }

  .launch-grid {
    grid-template-columns: 1fr;
  }

  .launch-card {
    min-height: 210px;
  }
}
</style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <a class="brand" href="./" aria-label="MYSKME 游戏设计">
      <div class="mark">M</div>
      <div>
        <div class="brand-name">MYSKME</div>
        <div class="brand-sub">Make Yourself Special &amp; Kind</div>
      </div>
    </a>
    <a class="repo-link" href="https://github.com/myskme/game-design">GitHub</a>
  </header>

  <main class="hero">
    <section class="headline">
      <div class="kicker">Game Design Lab</div>
      <h1>MYSKME 游戏设计</h1>
      <div class="lede">为课堂、聚会和小游戏实验准备的互动作品集。</div>
    </section>

    <section class="launch-grid" aria-label="作品入口">
      <a class="launch-card" href="myskme_midsummer_twelve_houses.html" style="--art: url('assets/loot-card-sheet.png')">
        <div class="launch-content">
          <div class="tag">Roguelite</div>
          <div>
            <h2 class="card-title">MYSKME 盛夏十二宫</h2>
            <div class="card-meta">课堂行动值协作战斗 · 单文件版</div>
          </div>
          <div class="go" aria-hidden="true">›</div>
        </div>
      </a>

      <a class="launch-card" href="梦幻城堡课堂积分器.html" style="--art: url('assets/castle-harbor-hero.png')">
        <div class="launch-content">
          <div class="tag">Classroom</div>
          <div>
            <h2 class="card-title">梦幻城堡课堂积分器</h2>
            <div class="card-meta">桌面浏览器版本</div>
          </div>
          <div class="go" aria-hidden="true">›</div>
        </div>
      </a>

      <a class="launch-card" href="ipad_bundle/index.html" style="--art: url('ipad_bundle/assets/castle-harbor-hero.png')">
        <div class="launch-content">
          <div class="tag">iPad</div>
          <div>
            <h2 class="card-title">课堂积分器 iPad 版</h2>
            <div class="card-meta">打包资源版本</div>
          </div>
          <div class="go" aria-hidden="true">›</div>
        </div>
      </a>

      <a class="launch-card" href="MYSKME_命运左轮.html" style="--art: url('assets/loot-card-sheet.png')">
        <div class="launch-content">
          <div class="tag">Party</div>
          <div>
            <h2 class="card-title">MYSKME 命运左轮</h2>
            <div class="card-meta">1 至 5 人派对局</div>
          </div>
          <div class="go" aria-hidden="true">›</div>
        </div>
      </a>
    </section>
  </main>

  <footer class="foot">
    <span>© MYSKME</span>
    <span>game-design</span>
  </footer>
</div>
</body>
</html>
